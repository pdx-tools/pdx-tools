name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [master]
  schedule:
    - cron: '0 2 * * *'

jobs:
  build-devcontainer:
    runs-on: ${{ matrix.runner }}
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'safe to test'))
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
    name: devcontainer / build / ${{ matrix.arch }}
    env:
      DEVCONTAINER_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_TERM_COLOR: always
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Dev Container image
      uses: devcontainers/ci@v0.3
      with:
        imageName: ghcr.io/pdx-tools/devcontainer
        imageTag: sha-${{ env.DEVCONTAINER_SHA }}-${{ matrix.arch }}
        cacheFrom: ghcr.io/pdx-tools/devcontainer
        platform: ${{ matrix.platform }}
        push: always

  test-devcontainer:
    runs-on: ${{ matrix.runner }}
    needs: build-devcontainer
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'safe to test'))
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
            with_tokens: false
          - runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
            with_tokens: true
          - runner: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
            with_tokens: false
    name: devcontainer / test / ${{ matrix.arch }} / tokens-${{ matrix.with_tokens && 'included' || 'absent' }}
    env:
      DEVCONTAINER_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_TERM_COLOR: always
    steps:
    - name: Remove unwanted software
      if: matrix.arch == 'amd64'
      run: |
        echo "before"
        df -h
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        echo "after"
        df -h

    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Cache assets
      if: matrix.arch == 'amd64'
      uses: actions/cache@v5
      with:
        path: |
          assets/game-bundles
          assets/eu4-saves
          src/vic3save/assets
          src/eu5save/assets
        key: asset-cache

    - uses: actions/checkout@v6
      name: Clone tokens
      if: matrix.with_tokens
      with:
        path: assets/tokens
        repository: pdx-tools/tokens
        token: ${{secrets.GH_PAT}}

    - name: Link tokens
      if: matrix.with_tokens
      run: cd assets/tokens && ln -s tokens/* .

    - name: Run Dev Container validation
      uses: devcontainers/ci@v0.3
      env:
        ASSETS_ACCESS_KEY: ${{ secrets.ASSETS_ACCESS_KEY }}
        ASSETS_SECRET_KEY: ${{ secrets.ASSETS_SECRET_KEY }}
        GH_PAT: ${{ secrets.GH_PAT }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        imageName: ghcr.io/pdx-tools/devcontainer
        imageTag: sha-${{ env.DEVCONTAINER_SHA }}-${{ matrix.arch }}
        cacheFrom: ghcr.io/pdx-tools/devcontainer:sha-${{ env.DEVCONTAINER_SHA }}-${{ matrix.arch }}
        platform: ${{ matrix.platform }}
        push: never
        env: |
          ASSETS_ACCESS_KEY
          ASSETS_SECRET_KEY
          CI
          GITHUB_TOKEN
        runCmd: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            mise install --verbose --jobs 1
            mise --version
            mise exec -- rustc --version
            mise exec -- pnpm --version
            steamcmd 2>&1 | grep -F "steamcmd is only installed in the amd64 devcontainer image."
          else
            mise run admin:assets:sync && \
            mise run admin:assets:compile:all && \
            mise run ${{ matrix.with_tokens && 'test:cargo' || 'test:wasm' }}
            ${{ matrix.with_tokens && 'mise run test:app ::: typecheck' || '' }}
            mise run build:app
          fi

  devcontainer-publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: test-devcontainer
    name: devcontainer / publish
    permissions:
      contents: read
      packages: write
    env:
      DEVCONTAINER_SHA: ${{ github.sha }}
    steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Publish Dev Container image
      run: |
        docker buildx imagetools create \
          -t ghcr.io/pdx-tools/devcontainer:latest \
          ghcr.io/pdx-tools/devcontainer:sha-${DEVCONTAINER_SHA}-amd64 \
          ghcr.io/pdx-tools/devcontainer:sha-${DEVCONTAINER_SHA}-arm64

  devcontainer-cleanup:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      github.event_name == 'schedule'
    needs: test-devcontainer
    name: devcontainer / cleanup
    permissions:
      packages: write
    steps:
    - name: Delete old Dev Container package versions
      uses: actions/delete-package-versions@v5
      with:
        package-name: devcontainer
        package-type: container
        min-versions-to-keep: 80
        ignore-versions: '^latest$'

  build:
    runs-on: ${{ matrix.os }}
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'safe to test'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            with_tokens: false
          - os: ubuntu-latest
            with_tokens: true
          - os: windows-latest
            with_tokens: false
          - os: windows-latest
            with_tokens: true
          - os: macos-15
            with_tokens: false # docker not supported on macos gh actions
    name: build / ${{ matrix.os }} / tokens-${{ matrix.with_tokens && 'included' || 'absent' }}
    env:
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          convert -version

          # Use bundled permissive policy.xml for file and large image processing
          sudo cp src/pdx-assets/policy.xml /etc/ImageMagick-6/policy.xml
      - name: Install dependencies (macos)
        if: matrix.os == 'macos-15'
        run: |
          brew install imagemagick

          # For some reason macos github runner stopped including a font and imagemagick montage needs it
          brew install --cask font-dejavu
          FONT_PATH="$(find "$HOME/Library/Fonts" -type f -name 'DejaVuSans.ttf' -print -quit)"
          echo "IMAGEMAGICK_FONT=$FONT_PATH" >> "$GITHUB_ENV"

      - name: Cache assets
        uses: actions/cache@v5
        with:
          key: asset-cache
          enableCrossOsArchive: true # shared cache between OSes
          path: |
            assets/game-bundles
            assets/eu4-saves
            src/vic3save/assets

      - uses: actions/checkout@v6
        name: Clone tokens
        if: matrix.with_tokens
        with:
          path: assets/tokens
          repository: pdx-tools/tokens
          token: ${{secrets.GH_PAT}}

      - name: Link tokens
        if: matrix.with_tokens
        run: cd assets/tokens && ln -s tokens/* .

      - uses: jdx/mise-action@v4
        with:
          cache: false

      # Trial out rust caching with the slowest run:
      - name: Cache Rust dependencies
        if: matrix.os == 'windows-latest' && matrix.with_tokens
        uses: Swatinem/rust-cache@v2

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
    
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store
  
      - name: Asset pipeline
        if: matrix.with_tokens # if tokens are enabled, process game bundles
        env:
          ASSETS_ACCESS_KEY: ${{ matrix.with_tokens && secrets.ASSETS_ACCESS_KEY || '' }}
          ASSETS_SECRET_KEY: ${{ matrix.with_tokens && secrets.ASSETS_SECRET_KEY || '' }}
        run: |
          mise run admin:assets:sync
          mise run admin:assets:compile:all
      - run: |
          mise run ${{ matrix.with_tokens && 'test:cargo' || 'test:wasm' }}
          ${{ matrix.with_tokens && 'mise run test:app ::: typecheck' || '' }}
          mise run build:app 
