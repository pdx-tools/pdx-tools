#:schema node_modules/wrangler/config-schema.json
name = "pdx-tools-workers"
compatibility_date = "2024-09-26"
compatibility_flags = ["nodejs_compat"]
main = "./server.ts"

[assets]
directory = "./build/client"

[observability]
enabled = true
head_sampling_rate = 1

[[analytics_engine_datasets]]
binding = "PDX_METRICS"
dataset = "pdx_metrics"

[version_metadata]
binding = "CF_VERSION_METADATA"

[[hyperdrive]]
binding = "PDX_DB"
id = "52bcc7b655d44776a6e42672fd11b388"
localConnectionString = "postgres://app_user:mercantilismbaby2@localhost:5432/postgres"

[[r2_buckets]]
binding = "SAVE_BUCKET"
bucket_name = "pdx-saves"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "pdx-media"

[env.test]

[[env.test.analytics_engine_datasets]]
binding = "PDX_METRICS"
dataset = "pdx_metrics"

[[env.test.hyperdrive]]
binding = "PDX_DB"
id = "52bcc7b655d44776a6e42672fd11b388"
localConnectionString = "postgres://app_user:mercantilismbaby@localhost:5433/postgres"

[[env.test.r2_buckets]]
binding = "SAVE_BUCKET"
bucket_name = "pdx-saves-test"

[[env.test.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "pdx-media-test"

[env.test.version_metadata]
binding = "CF_VERSION_METADATA"
